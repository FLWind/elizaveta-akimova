copyright = "© Акимова Елизавета"
defaultContentLanguage = "ru"
disableLanguages = ["en"]
disableKinds = ["taxonomy"]
enableRobotsTXT = true
languageCode = "ru-RU"
timeZone = "Europe/Moscow"
timeout = "120s"
title = "Галерея работ"
theme = "gallery"
publishDir = "public/akimova.ru"

[params]
  defaultTheme = "dark"
  description = "Галерея работ художницы Елизаветы Акимовой"
  title = "Галерея моих работ"
  [params.author]
    email = "elizaveta@akimova.ru"
    name = "Акимова Елизавета"
  [params.socialIcons]
    #facebook = "https://www.facebook.com/"
    #instagram = "https://www.instagram.com/"
    #github = "https://github.com/nicokaiser/hugo-theme-gallery/"
    #youtube = "https://www.youtube.com/"
    email = "mailto:elizaveta@akimova.ru"
    website = "https://akimova.ru"
    #mastodon = "https://example.com"
    #pixelfed = "https://example.com"
    #mixcloud = "https://example.com"
    #flickr = "https://www.flickr.com"
    #500px = "https://500px"
    #whatsapp = "1234567890"
  [params.gallery]
    #boxSpacing = 10
    #targetRowHeight = 288
    #targetRowHeightTolerance = 0.25

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML"]

[imaging]
  quality = 75
  resampleFilter = "CatmullRom"
  [imaging.exif]
    disableDate = false
    disableLatLong = true
    includeFields = "ImageDescription|Orientation"

